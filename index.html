<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>شجرة العشيرة الاحترافية</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<!-- مكتبات التصدير -->
<script src="https://cdn.jsdelivr.net/npm/canvg@4.0.1/lib/umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    direction: rtl;
    background: linear-gradient(#e8f5e9, #c8e6c9);
    text-align: center;
}

h2 { margin: 10px; }

.note {
    background: #fff3cd;
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    display: inline-block;
}

.controls { margin: 10px; }

button {
    padding: 8px;
    margin: 5px;
    border-radius: 6px;
    border: none;
    background: #2e7d32;
    color: white;
    cursor: pointer;
}

svg { margin-top: 10px; }

.link {
    fill: none;
    stroke: #5D4037;
    stroke-width: 4;
}

.leaf {
    fill: #43A047;
    stroke: #1B5E20;
    stroke-width: 2;
}

.node text {
    fill: white;
    font-size: 11px;
}
</style>
</head>

<body>

<h2>🌳 شجرة العشيرة</h2>

<div class="controls">
    <button onclick="exportImage()">📸 تصدير صورة</button>
    <button onclick="exportPDF()">📄 تصدير PDF</button>
</div>

<div class="note">
🔒 التعديل يتم فقط من محمد باسم عبدالكريم
</div>

<svg width="1200" height="650"></svg>

<script>

let data = {};

fetch("data.json")
.then(res => res.json())
.then(json => {
    data = json;
    drawTree();
});

// رسم الشجرة
function drawTree() {
    const svg = d3.select("svg");
    svg.selectAll("*").remove();

    const root = d3.hierarchy(data);

    const treeLayout = d3.tree()
        .size([1100, 550])
        .separation((a, b) => (a.parent == b.parent ? 1.2 : 1.6));

    treeLayout(root);

    const link = d3.linkVertical()
        .x(d => d.x + 50)
        .y(d => d.y + 50);

    svg.selectAll(".link")
        .data(root.links())
        .enter()
        .append("path")
        .attr("class", "link")
        .attr("d", link);

    const nodes = svg.selectAll(".node")
        .data(root.descendants())
        .enter()
        .append("g")
        .attr("transform", d => `translate(${d.x + 50},${d.y + 50})`);

    nodes.append("ellipse")
        .attr("class", "leaf")
        .attr("rx", 32)
        .attr("ry", 18);

    nodes.append("text")
        .text(d => d.data.name)
        .attr("text-anchor", "middle")
        .attr("dy", 4);
}

//////////////////////////////////////////////////
// 📸 تصدير صورة + علامة مائية
//////////////////////////////////////////////////

async function exportImage() {
    const svg = document.querySelector("svg");

    const canvas = document.createElement("canvas");
    canvas.width = svg.clientWidth * 3;
    canvas.height = svg.clientHeight * 3;

    const ctx = canvas.getContext("2d");

    const serializer = new XMLSerializer();
    const svgString = serializer.serializeToString(svg);

    const v = await canvg.Canvg.fromString(ctx, svgString);
    await v.render();

    // ✍️ علامة مائية
    ctx.font = "30px Arial";
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.textAlign = "center";
    ctx.fillText("تم بواسطة محمد باسم عبدالكريم", canvas.width / 2, canvas.height - 30);

    const link = document.createElement("a");
    link.download = "tree.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}

//////////////////////////////////////////////////
// 📄 تصدير PDF + علامة مائية
//////////////////////////////////////////////////

async function exportPDF() {
    const svg = document.querySelector("svg");

    const canvas = document.createElement("canvas");
    canvas.width = svg.clientWidth * 3;
    canvas.height = svg.clientHeight * 3;

    const ctx = canvas.getContext("2d");

    const serializer = new XMLSerializer();
    const svgString = serializer.serializeToString(svg);

    const v = await canvg.Canvg.fromString(ctx, svgString);
    await v.render();

    // ✍️ علامة مائية
    ctx.font = "30px Arial";
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.textAlign = "center";
    ctx.fillText("تم بواسطة محمد باسم عبدالكريم", canvas.width / 2, canvas.height - 30);

    const imgData = canvas.toDataURL("image/png");

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("landscape");

    pdf.addImage(imgData, "PNG", 10, 10, 280, 150);
    pdf.save("tree.pdf");
}

</script>

</body>
</html>
