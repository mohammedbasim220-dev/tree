<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>شجرة العشيرة الاحترافية</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<!-- تصدير -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body {
    margin: 0;
    font-family: "Cairo", Arial;
    direction: rtl;
    text-align: center;
    background: linear-gradient(#e8f5e9, #c8e6c9);
}

.controls {
    background: white;
    padding: 10px;
    border-radius: 10px;
    margin: 10px;
}

button, input {
    padding: 8px;
    margin: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    background: #2e7d32;
    color: white;
    border: none;
}

svg {
    margin-top: 10px;
}

/* الفروع */
.link {
    fill: none;
    stroke: #6d4c41;
    stroke-width: 4;
}

/* الجذع */
.trunk {
    stroke: #3e2723;
    stroke-width: 10;
}

/* الأوراق */
.leaf {
    fill: #43A047;
    stroke: #1B5E20;
    stroke-width: 2;
}

.node text {
    fill: white;
    font-size: 11px;
}
</style>
</head>

<body>

<h2>🌳 شجرة العشيرة</h2>

<div class="controls">
    <input id="searchName" placeholder="ابحث عن اسم">
    <button onclick="searchPerson()">🔍 بحث</button>

    <button onclick="exportImage()">📸 صورة</button>
    <button onclick="exportPDF()">📄 PDF</button>
</div>

<div class="note">
🔒 التعديل يتم فقط من محمد باسم عبدالكريم
</div>

<svg width="1200" height="700"></svg>

<script>

// البيانات
let data = {};

// تحميل من GitHub
fetch("data.json")
    .then(res => res.json())
    .then(json => {
        data = json;
        drawTree();
    });

// 🔍 البحث
function searchPerson() {
    let name = document.getElementById("searchName").value.trim();
    let found = null;

    function search(node) {
        if (node.name.includes(name)) {
            found = node;
            return;
        }
        if (node.children) {
            for (let c of node.children) {
                search(c);
                if (found) return;
            }
        }
    }

    search(data);

    if (found) alert("✅ " + found.name);
    else alert("❌ غير موجود");
}

// 🌳 رسم الشجرة
function drawTree() {
    const svg = d3.select("svg");
    svg.selectAll("*").remove();

    const root = d3.hierarchy(data);

    const tree = d3.tree()
        .size([1100, 600])
        .separation((a, b) => 1.3);

    tree(root);

    const g = svg.append("g").attr("transform", "translate(50,50)");

    // الفروع
    g.selectAll(".link")
        .data(root.links())
        .enter()
        .append("path")
        .attr("class", d => d.source.depth === 0 ? "link trunk" : "link")
        .attr("d", d3.linkVertical()
            .x(d => d.x)
            .y(d => d.y)
        );

    // العقد
    const node = g.selectAll(".node")
        .data(root.descendants())
        .enter()
        .append("g")
        .attr("transform", d => `translate(${d.x},${d.y})`);

    // شكل الورقة
    node.append("ellipse")
        .attr("class", "leaf")
        .attr("rx", d => d.depth === 0 ? 30 : 18)
        .attr("ry", d => d.depth === 0 ? 25 : 12)
        .attr("fill", d => d.depth === 0 ? "#8d6e63" : "#43A047");

    node.append("text")
        .text(d => d.data.name)
        .attr("text-anchor", "middle")
        .attr("dy", 4);
}

// 📸 تصدير صورة
function exportImage() {
    html2canvas(document.querySelector("svg"), { scale: 5 })
    .then(canvas => {
        let link = document.createElement("a");
        link.download = "tree.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}

// 📄 تصدير PDF
async function exportPDF() {
    const { jsPDF } = window.jspdf;

    const canvas = await html2canvas(document.querySelector("svg"), {
        scale: 4
    });

    const img = canvas.toDataURL("image/png");

    const pdf = new jsPDF("landscape");
    pdf.addImage(img, "PNG", 10, 10, 280, 150);
    pdf.save("tree.pdf");
}

</script>

</body>
</html>
